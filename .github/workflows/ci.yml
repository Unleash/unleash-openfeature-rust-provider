name: CI

on:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Build
        run: cargo build

      - name: Build async-std
        run: cargo build --no-default-features --features async-std

      - name: Check formatting
        run: cargo fmt --check

      - name: Test
        run: cargo test

      - name: Test async-std
        run: cargo test --no-default-features --features async-std

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Clippy async-std
        run: cargo clippy --all-targets --no-default-features --features async-std -- -D warnings
